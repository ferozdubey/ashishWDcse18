<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //loops: used to repeteadly run a code until a specific condition is made.
        
        //for loop: used when you know the number of iterations in advance
        let students=["aryan kaushik","ashish rana","nitin", "arnav","ashwin"];

        for(let i=0;i<students.length;i++){
            console.log(students[i]);
        }
        // while loop........
        let x=0;
        while(x<students.length){
            console.log(students[x]);
            x++;

        }
        for (let y of students){
            console.log(y);
        }
    </script>
</body>
</html>
